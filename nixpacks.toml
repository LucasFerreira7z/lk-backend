[phases.setup]
nixPkgs = ["nodejs", "ffmpeg", "python311"]

[phases.install]
cmds = [
    "pip uninstall -y yt-dlp",
    "pip install yt-dlp==2024.12.13",
    "pip install flask flask-cors gunicorn",
    "npm install -g @yt-dlp/ejs"
]

[start]
cmd = "gunicorn server:app -b 0.0.0.0:${PORT:-8080} --timeout 300"
